<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>世界年鑑 · 國家速覽</title>

  <!-- MapLibre GL JS is the default no-token map engine. -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- Mapbox GL JS is optional and only used when a token is provided. -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.7.0/mapbox-gl.js"></script>

  <!-- Mapbox GL Language plugin for Traditional Chinese labels -->
  <script src="https://unpkg.com/@mapbox/mapbox-gl-language@1.0.1/index.js"></script>

  <!-- Optional: provide a Mapbox token to enable the Mapbox engine.
       config.local.js is gitignored — create it locally and set
       window.WORLD_ALMANAC_MAPBOX_TOKEN = 'pk....'; there.
       (or append ?mbtoken=pk... to the URL instead) -->
  <script src="config.local.js" onerror="console.info('[world-almanic] config.local.js not found — Mapbox token unset, MapLibre still works')"></script>

  <link rel="stylesheet" href="assets/styles.css?v=199" />
</head>
<body>
  <script>
    if (location.protocol === 'file:') {
      document.addEventListener('DOMContentLoaded', () => {
        const notice = document.getElementById('notice');
        if (!notice) return;
        notice.textContent = '請用 static server 開啟此頁：在專案目錄執行 python3 -m http.server 8080，然後開啟 http://localhost:8080/。直接用 file:// 會被瀏覽器 CORS 政策阻擋 ES modules 與 JSON 載入。';
        notice.hidden = false;
      });
    }
  </script>
  <div class="page">
    <div class="panel">
      <header class="header">
        <div class="brand">
          <img class="cna-logo" src="assets/img/cna-logo.svg?v=199" alt="CNA" />
          <div class="title">世界年鑑 · 國家速覽</div>
        </div>
      </header>

      <div class="searchbar">
        <input id="search" type="text" autocomplete="off" placeholder="🔍 搜尋國家（中／英）…"
               aria-label="搜尋國家" role="combobox" aria-expanded="false" aria-controls="suggest" />
        <ul id="suggest" class="suggest" role="listbox" hidden></ul>
      </div>

      <p id="notice" class="notice" hidden></p>

      <div id="layout" class="layout">
        <div id="map" class="map" aria-label="世界地圖"></div>
        <div id="panel" class="entry" aria-live="polite"></div>
      </div>

      <div class="footer">資料來源：中央社世界年鑑（2025）· 製圖 CNA</div>
    </div>
  </div>

  <script type="module" src="src/main.js?v=199"></script>
</body>
</html>
